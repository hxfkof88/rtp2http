name: Build Linux amd64 Binary

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  BINARY_NAME: rtp2http

jobs:
  build-linux-amd64:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Build binary
        run: |
          mkdir -p build
          gcc -O2 -static -s rtphttp.c -o build/${BINARY_NAME}-linux-amd64

      - name: Verify binary
        run: |
          ls -lh build/
          file build/${BINARY_NAME}-linux-amd64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rtp2http-linux-amd64
          path: build/rtp2http-linux-amd64
